{% extends "layout.html" %}
{% block main %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Register</h2>
                    <form action="/register" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input autocomplete="off" autofocus class="form-control" name="username" id="username" placeholder="Username" type="text" required>
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Address</label>
                            <input class="form-control" name="location" id="location" placeholder="e.g. 123 Main St" type="text" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input class="form-control" name="password" id="password" placeholder="Password" type="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmation" class="form-label">Confirm Password</label>
                            <input class="form-control" name="confirmation" id="confirmation" placeholder="Confirm Password" type="password" required>
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary" type="submit">Register</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        Already have an account? <a href="/login">Log In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
