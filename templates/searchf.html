{% extends "layout.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 rounded-lg">
                <div class="card-header bg-white border-bottom py-3">
                    <h4 class="mb-0 fw-bold text-primary">Search Friends</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" class="mb-4">
                        <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden">
                            <span class="input-group-text bg-white border-end-0 px-3">
                                <i class="bi bi-search text-muted"></i>
                            </span>
                            <input type="text" name="query" class="form-control border-start-0 ps-0 focus-none" placeholder="Search by username..." required>
                            <button class="btn btn-primary px-4 fw-bold" type="submit">Find Friends</button>
                        </div>
                    </form>

                    <style>
                        .focus-none:focus {
                            box-shadow: none;
                            border-color: #dee2e6;
                        }
                    </style>

                    {% if users %}
                    <div class="list-group">
                        {% for user in users %}
                        <div class="list-group-item d-flex justify-content-between align-items-center border-start-0 border-end-0 px-0">
                            <div>
                                <h6 class="mb-0 fw-bold">{{ user.username }}</h6>
                            </div>
                            <form action="{{ url_for('add_friend', friend_id=user.id) }}" method="POST">
                                <button type="submit" class="btn btn-sm btn-outline-primary rounded-pill px-3">Add Friend</button>
                            </form>
                        </div>
                        {% endfor %}
                    </div>
                    {% elif request.method == 'POST' %}
                    <p class="text-muted text-center py-3">No users found.</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
