{% extends "layout.html" %}

{% block main %}
<div class="row mt-5">
    <div class="col-md-4 mb-4">
        <div class="card h-100 border-0 p-3">
            <div class="card-body text-center">
                <div class="display-5 mb-3">👥</div>
                <h3 class="card-title h4 fw-bold">Friend List</h3>
                <p class="card-text text-muted mb-4">Stay connected with your inner circle.</p>
                <button class="btn btn-light w-100 text-muted" disabled>Coming Soon</button>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card h-100 border-0 p-3">
            <div class="card-body text-center">
                <div class="display-5 mb-3">🔒</div>
                <h3 class="card-title h4 fw-bold">Private Map</h3>
                <p class="card-text text-muted mb-4">Secure, real-time family tracking.</p>
                <a href="/private-map" class="btn btn-primary w-100 py-2">Open Private Map</a>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card h-100 border-0 p-3">
            <div class="card-body text-center">
                <div class="display-5 mb-3">🌐</div>
                <h3 class="card-title h4 fw-bold">Public Map</h3>
                <p class="card-text text-muted mb-4">View shared authorized locations.</p>
                <a href="/public-map" class="btn btn-outline-primary w-100 py-2">View Public Map</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
