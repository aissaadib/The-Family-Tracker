{% extends "layout.html" %}
{% block main %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card border-0 p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <span class="display-6">👋</span>
                        <h2 class="fw-bold mt-2">Welcome Back</h2>
                        <p class="text-muted">Enter your details to access your map</p>
                    </div>
                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-bold text-uppercase">Username</label>
                            <input autocomplete="off" autofocus class="form-control bg-light border-0 py-2" name="username" id="username" placeholder="e.g. john_doe" type="text" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-uppercase">Password</label>
                            <input class="form-control bg-light border-0 py-2" name="password" id="password" placeholder="••••••••" type="password" required>
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary py-2" type="submit">Sign In</button>
                        </div>
                    </form>
                    <div class="mt-4 text-center small text-muted">
                        New here? <a href="/register" class="text-primary text-decoration-none fw-bold">Create an account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
