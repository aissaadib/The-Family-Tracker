{% extends "layout.html" %}

{% block head %}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
      #map { height: 600px; width: 100%; border-radius: 8px; margin-top: 20px; }
      #legend { margin-bottom: 10px; background: #eee; padding: 10px; border-radius: 5px; }
      #legend span { margin-right: 15px; font-weight: bold; }
  </style>
{% endblock %}

{% block main %}
    <div class="row">
        <div class="col-12">
            <h1>Family Map</h1>
            <div id="legend">
                <strong>Legend:</strong>
                {% for p in family %}
                <span>{{ p.name }} ({{ p.role }})</span>
                {% endfor %}
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([34.020882, -6.841650], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let markersLayer = L.layerGroup().addTo(map);

        async function loadLocations() {
            try {
                const response = await fetch('/api/locations');
                if (!response.ok) return; // Maybe redirected to login
                const people = await response.json();
                
                markersLayer.clearLayers();
                people.forEach(p => {
                    const marker = L.marker([p.lat, p.lon])
                     .bindPopup(`<b>${p.name}</b><br>${p.role}<br>Last update: ${new Date(p.last_update*1000).toLocaleTimeString()}`);
                    marker.addTo(markersLayer);
                });
            } catch (e) { console.error(e); }
        }
        
        loadLocations();
        setInterval(loadLocations, 5000);
    </script>
{% endblock %}
